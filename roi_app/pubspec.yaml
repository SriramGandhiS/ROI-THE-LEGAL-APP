name: login_signup
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  icons_plus: ^4.0.0
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  get: ^4.6.6
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.2.1
  google_fonts: ^6.2.1
  velocity_x: ^4.2.1
  video_player: ^2.5.2
  chewie: ^1.3.0
  flutter_swiper_view: ^1.1.8
  audioplayers: ^6.1.0
  http: ^1.2.2
  chat_gpt_sdk: ^3.1.0
  flutter_gemini: ^2.0.5
  google_generative_ai: ^0.4.6
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  image_picker: ^1.1.2
  url_launcher: ^6.1.10
  mailer: ^6.1.2
  pdf: ^3.11.1
  printing: ^5.13.2
  pdf_image_renderer: ^1.0.0
  firebase_storage: ^12.3.1
  youtube_player_iframe: ^5.2.2
  flutter_svg: ^2.0.10+1
  faker: ^2.2.0
  carousel_slider: ^5.1.2
  latlng: ^2.0.7
  map: ^2.0.2
  pin_code_fields: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

  # ✅ Add this plugin for app icon generation
  flutter_launcher_icons: ^0.14.1

# ✅ App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_main.png"   # <-- place your logo image here
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/videos/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
        - asset: assets/fonts/Inter-Bold.ttf

    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-ExtraLight.ttf
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
